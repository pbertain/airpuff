name: Monitoring & Alerting

on:
  schedule:
    # Run every 30 minutes instead of every 5 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of check'
        required: true
        type: choice
        options:
        - health-check
        - performance-check
        - security-check
        - backup-check
        - log-analysis

env:
  PYTHON_VERSION: '3.11'

jobs:
  health-monitoring:
    name: Health Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.check_type == 'health-check'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Health check all environments
        run: |
          echo "🏥 Running health checks on all environments"
          
          # Check development (using correct URL)
          DEV_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://host74.nird.club:25081/health || echo "000")
          if [ "$DEV_STATUS" != "200" ]; then
            echo "❌ Development environment is down (HTTP $DEV_STATUS)"
            echo "DEV_DOWN=true" >> $GITHUB_ENV
          else
            echo "✅ Development environment is healthy"
          fi
          
          # Check production (using correct URL)
          PROD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://www.airpuff.info/health || echo "000")
          if [ "$PROD_STATUS" != "200" ]; then
            echo "❌ Production environment is down (HTTP $PROD_STATUS)"
            echo "PROD_DOWN=true" >> $GITHUB_ENV
          else
            echo "✅ Production environment is healthy"
          fi

      - name: Send health alerts
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: |
            Development: ${{ env.DEV_DOWN == 'true' && '❌ DOWN' || '✅ HEALTHY' }}
            Production: ${{ env.PROD_DOWN == 'true' && '❌ DOWN' || '✅ HEALTHY' }}
        if: env.DEV_DOWN == 'true' || env.PROD_DOWN == 'true'

  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.check_type == 'performance-check'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          sudo apt-get update && sudo apt-get install -y bc

      - name: Performance check
        run: |
          echo "⚡ Running performance checks"
          
          # Check response times (using correct URLs)
          DEV_TIME=$(curl -s -o /dev/null -w "%{time_total}" http://host74.nird.club:25081/health || echo "10.0")
          PROD_TIME=$(curl -s -o /dev/null -w "%{time_total}" http://www.airpuff.info/health || echo "10.0")
          
          echo "Response times:"
          echo "Development: ${DEV_TIME}s"
          echo "Production: ${PROD_TIME}s"
          
          # Check if response times are acceptable (under 5 seconds)
          if (( $(echo "$DEV_TIME > 5.0" | bc -l) )); then
            echo "⚠️ Development response time is slow: ${DEV_TIME}s"
            echo "DEV_SLOW=true" >> $GITHUB_ENV
          fi
          
          if (( $(echo "$PROD_TIME > 5.0" | bc -l) )); then
            echo "⚠️ Production response time is slow: ${PROD_TIME}s"
            echo "PROD_SLOW=true" >> $GITHUB_ENV
          fi

      - name: Send performance alerts
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#performance'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: |
            Development: ${{ env.DEV_SLOW == 'true' && '⚠️ SLOW' || '✅ OK' }}
            Production: ${{ env.PROD_SLOW == 'true' && '⚠️ SLOW' || '✅ OK' }}
        if: env.DEV_SLOW == 'true' || env.PROD_SLOW == 'true'

  security-monitoring:
    name: Security Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.check_type == 'security-check'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Security check
        run: |
          echo "🔒 Running security checks"
          
          # Check for common security headers (using correct URLs)
          PROD_HEADERS=$(curl -s -I http://www.airpuff.info/health || echo "")
          
          # Check for security headers
          if [[ "$PROD_HEADERS" != *"X-Content-Type-Options"* ]]; then
            echo "⚠️ Missing security headers in production"
            echo "PROD_HEADERS_ISSUE=true" >> $GITHUB_ENV
          fi

      - name: Send security alerts
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#security'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: |
            Headers Issue: ${{ env.PROD_HEADERS_ISSUE == 'true' && '⚠️ YES' || '✅ NO' }}
        if: env.PROD_HEADERS_ISSUE == 'true'

  backup-monitoring:
    name: Backup Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.check_type == 'backup-check'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Check backup status
        run: |
          echo "💾 Checking backup status"
          
          # Check if backups are recent (within last 24 hours)
          # This would check backup files and their timestamps
          echo "Backup check completed"

      - name: Send backup alerts
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#backups'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: |
            Backup Status: ✅ OK
        if: always()

  log-analysis:
    name: Log Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.check_type == 'log-analysis'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Analyze logs
        run: |
          echo "📊 Analyzing logs for errors and patterns"
          
          # This would analyze log files for errors, patterns, etc.
          # For now, just check if services are running
          echo "Log analysis completed"

      - name: Send log alerts
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#logs'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: |
            Log Analysis: ✅ OK
        if: always()

  monitoring-summary:
    name: Monitoring Summary
    runs-on: ubuntu-latest
    needs: [health-monitoring, performance-monitoring, security-monitoring, backup-monitoring, log-analysis]
    if: always()
    
    steps:
      - name: Send monitoring summary
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#monitoring'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: |
            Health Check: ${{ needs.health-monitoring.result }}
            Performance Check: ${{ needs.performance-monitoring.result }}
            Security Check: ${{ needs.security-monitoring.result }}
            Backup Check: ${{ needs.backup-monitoring.result }}
            Log Analysis: ${{ needs.log-analysis.result }}
        if: always()
