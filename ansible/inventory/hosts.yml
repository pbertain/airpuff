# AirPuff Inventory Configuration
all:
  children:
    airpuff_dev:
      hosts:
        airpuff-dev:
          ansible_host: 192.168.1.100
          ansible_user: deploy
          ansible_ssh_private_key_file: ~/.ssh/airpuff_dev_key
          environment: development
          domain: dev.airpuff.local
          ssl_enabled: false
      vars:
        app_port: 8000
        grafana_port: 3000
        timescaledb_port: 5432
        redis_port: 6379
        
    airpuff_prod:
      hosts:
        airpuff-prod:
          ansible_host: 192.168.1.200
          ansible_user: deploy
          ansible_ssh_private_key_file: ~/.ssh/airpuff_prod_key
          environment: production
          domain: airpuff.com
          ssl_enabled: true
      vars:
        app_port: 8000
        grafana_port: 3000
        timescaledb_port: 5432
        redis_port: 6379
        
    airpuff_staging:
      hosts:
        airpuff-staging:
          ansible_host: 192.168.1.150
          ansible_user: deploy
          ansible_ssh_private_key_file: ~/.ssh/airpuff_staging_key
          environment: staging
          domain: staging.airpuff.com
          ssl_enabled: true
      vars:
        app_port: 8000
        grafana_port: 3000
        timescaledb_port: 5432
        redis_port: 6379
