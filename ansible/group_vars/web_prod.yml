# Production Environment Variables
---
# Override global variables for production

# Application Configuration
airpuff_app_home: "/opt/prod/airpuff"
airpuff_app_logs: "/var/log/prod/airpuff"
airpuff_app_data: "/var/lib/prod/airpuff"

# Application Ports
airpuff_app_port: 25080
airpuff_grafana_port: 3000

# Application Hostname
airpuff_app_hostname: "www.airpuff.info"

# Database Configuration
postgresql_db_name: "airpuff"
postgresql_db_user: "airpuff"
postgresql_db_password: "{{ vault_postgresql_password }}"

# Redis Configuration
redis_database: 0

# Environment
environment: "production"
debug: false
log_level: "INFO"

# Performance (optimized for prod)
workers: 4
max_requests: 1000
max_requests_jitter: 100

# Monitoring (enabled for prod)
monitoring_enabled: true
grafana_enabled: true

# Security (strict for prod)
fail2ban_enabled: true
ssl_enabled: true

# Backup (enabled for prod)
backup_enabled: true
backup_retention_days: 30
backup_schedule: "0 2 * * *"  # Daily at 2 AM

# External APIs (production keys)
fli_rite_api_key: "{{ vault_fli_rite_api_key }}"
checkwx_api_key: "{{ vault_checkwx_api_key }}"

# OAuth (production credentials)
google_client_id: "{{ vault_google_client_id }}"
google_client_secret: "{{ vault_google_client_secret }}"
apple_client_id: "{{ vault_apple_client_id }}"
apple_client_secret: "{{ vault_apple_client_secret }}"

# iMessage (production configuration)
imessage_bridge_url: "{{ vault_imessage_bridge_url }}"
imessage_api_key: "{{ vault_imessage_api_key }}"

