# Development Environment Variables
---
# Override global variables for development

# Application Configuration
airpuff_app_home: "/opt/airpuff-dev"
airpuff_app_logs: "/var/log/airpuff-dev"
airpuff_app_data: "/var/lib/airpuff-dev"

# Application Ports
airpuff_app_port: 25081
airpuff_grafana_port: 3001

# Application Hostname
airpuff_app_hostname: "dev.airpuff.info"

# Database Configuration
postgresql_db_name: "airpuff_dev"
postgresql_db_user: "airpuff_dev"
postgresql_db_password: "{{ vault_postgresql_dev_password | default('airpuff_dev_password') }}"

# Redis Configuration
redis_database: 1

# Environment
environment: "development"
debug: true
log_level: "DEBUG"

# Performance (reduced for dev)
workers: 2
max_requests: 100
max_requests_jitter: 10

# Monitoring (optional for dev)
monitoring_enabled: false
grafana_enabled: false

# Security (relaxed for dev)
fail2ban_enabled: false
ssl_enabled: false

# Backup (disabled for dev)
backup_enabled: false

