---
# AirPuff Complete Deployment Playbook
# This playbook deploys the entire AirPuff application stack

- name: Deploy AirPuff Application Stack
  hosts: "{{ target | default('airpuff_dev') }}"
  become: yes
  gather_facts: yes
  
  vars:
    deploy_user: "{{ ansible_user }}"
    app_repo: "https://github.com/your-org/airpuff.git"
    app_branch: "{{ environment | default('dev') }}"
    
  pre_tasks:
    - name: Display deployment information
      debug:
        msg:
          - "Deploying AirPuff to {{ inventory_hostname }}"
          - "Environment: {{ environment }}"
          - "Domain: {{ domain }}"
          - "User: {{ deploy_user }}"
          - "Branch: {{ app_branch }}"
    
    - name: Check if running as root
      fail:
        msg: "This playbook should not be run as root. Use a sudo user instead."
      when: ansible_user == "root"
    
    - name: Verify required variables
      fail:
        msg: "Required variable {{ item }} is not defined"
      loop:
        - "environment"
        - "domain"
      when: item is not defined

  roles:
    - role: system_setup
      tags: [system, setup]
    
    - role: python_setup
      tags: [python, setup]
    
    - role: postgresql_setup
      tags: [database, postgresql, setup]
    
    - role: airpuff_app
      tags: [app, deployment]

  post_tasks:
    - name: Display deployment summary
      debug:
        msg:
          - "AirPuff deployment completed successfully!"
          - "Application URL: http://{{ airpuff_app_hostname }}:{{ airpuff_app_port }}"
          - "Environment: {{ environment }}"
          - "Logs: {{ airpuff_app_logs }}"
