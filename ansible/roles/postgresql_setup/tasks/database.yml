---
# Database Creation

- name: Create AirPuff database user
  postgresql_user:
    name: "{{ postgresql_db_user }}"
    password: "{{ postgresql_db_password }}"
    state: present
  become_user: postgres
  tags: [postgresql, database]

- name: Create AirPuff database
  postgresql_db:
    name: "{{ postgresql_db_name }}"
    owner: "{{ postgresql_db_user }}"
    state: present
  become_user: postgres
  tags: [postgresql, database]

- name: Grant database privileges
  postgresql_privs:
    database: "{{ postgresql_db_name }}"
    roles: "{{ postgresql_db_user }}"
    privs: ALL
    type: database
  become_user: postgres
  tags: [postgresql, database]

- name: Grant schema privileges for existing objects
  postgresql_privs:
    database: "{{ postgresql_db_name }}"
    roles: "{{ postgresql_db_user }}"
    privs: USAGE,CREATE
    type: schema
    objs: public
  become_user: postgres
  tags: [postgresql, database]

- name: Grant table privileges for existing objects
  postgresql_privs:
    database: "{{ postgresql_db_name }}"
    roles: "{{ postgresql_db_user }}"
    privs: ALL
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
  become_user: postgres
  tags: [postgresql, database]

- name: Grant sequence privileges for existing objects
  postgresql_privs:
    database: "{{ postgresql_db_name }}"
    roles: "{{ postgresql_db_user }}"
    privs: ALL
    type: sequence
    objs: ALL_IN_SCHEMA
    schema: public
  become_user: postgres
  tags: [postgresql, database]

- name: Create database extensions
  postgresql_ext:
    name: "{{ item }}"
    db: "{{ postgresql_db_name }}"
    state: present
  become_user: postgres
  loop:
    - "uuid-ossp"
    - "pg_trgm"
    - "btree_gin"
    - "btree_gist"
  tags: [postgresql, database]
