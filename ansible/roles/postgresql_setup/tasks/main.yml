---
# PostgreSQL Setup Role - Main Tasks

- name: Add PostgreSQL signing key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /tmp/postgresql-key.asc
    mode: '0644'
  tags: [postgresql, repository]

- name: Add PostgreSQL signing key to apt
  apt_key:
    file: /tmp/postgresql-key.asc
    state: present
  tags: [postgresql, repository]

- name: Add PostgreSQL APT repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt/ {{ ansible_distribution_release }}-pgdg main"
    state: present
    update_cache: yes
  tags: [postgresql, repository]

- name: Install PostgreSQL
  apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - "postgresql-contrib-{{ postgresql_version }}"
      - "postgresql-server-dev-{{ postgresql_version }}"
    state: present
  tags: [postgresql, packages]

- name: Add TimescaleDB APT repository (official method)
  shell: |
    sh -c 'echo "deb https://packagecloud.io/timescale/timescaledb/ubuntu/ $(lsb_release -c -s) main" > /etc/apt/sources.list.d/timescaledb.list'
  register: timescaledb_repo_add
  tags: [timescaledb, repository]

- name: Display TimescaleDB repository add result
  debug:
    var: timescaledb_repo_add
  tags: [timescaledb, debug]

- name: Add TimescaleDB GPG key (official method)
  shell: |
    wget --quiet -O - https://packagecloud.io/timescale/timescaledb/gpgkey | apt-key add -
  register: timescaledb_key_add
  tags: [timescaledb, repository]

- name: Display TimescaleDB key add result
  debug:
    var: timescaledb_key_add
  tags: [timescaledb, debug]

- name: Update package cache
  apt:
    update_cache: yes
  tags: [timescaledb, repository]

- name: Install TimescaleDB
  apt:
    name: "timescaledb-2-postgresql-{{ postgresql_version }}"
    state: present
  register: timescaledb_install_result
  tags: [timescaledb, packages]

- name: Display TimescaleDB installation result
  debug:
    var: timescaledb_install_result
  tags: [timescaledb, debug]

- name: Verify TimescaleDB package installation
  command: dpkg -l | grep timescaledb
  register: timescaledb_verify
  ignore_errors: yes
  tags: [timescaledb, debug]

- name: Display TimescaleDB verification result
  debug:
    var: timescaledb_verify.stdout_lines
  tags: [timescaledb, debug]

- name: Configure PostgreSQL
  include_tasks: configure.yml
  tags: [postgresql, configure]

- name: Create AirPuff database
  include_tasks: database.yml
  tags: [postgresql, database]

- name: Configure TimescaleDB
  include_tasks: timescaledb.yml
  tags: [timescaledb, configure]

- name: Start and enable PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: yes
  tags: [postgresql, service]
