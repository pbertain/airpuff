---
# TimescaleDB Configuration

- name: Ensure PostgreSQL is running
  systemd:
    name: postgresql
    state: started
    enabled: yes
  become: yes
  tags: [timescaledb, service]

- name: Wait for PostgreSQL to be ready
  wait_for:
    port: 5432
    host: localhost
    delay: 5
    timeout: 60
  become_user: postgres
  tags: [timescaledb, service]

- name: Check PostgreSQL status
  command: pg_isready -h localhost -p 5432
  become_user: postgres
  register: pg_status
  tags: [timescaledb, debug]

- name: Display PostgreSQL status
  debug:
    var: pg_status.stdout_lines
  tags: [timescaledb, debug]

- name: Check if TimescaleDB package is installed
  shell: dpkg -l | grep timescaledb
  register: timescaledb_package
  ignore_errors: yes
  tags: [timescaledb, debug]

- name: Display TimescaleDB package status
  debug:
    var: timescaledb_package.stdout_lines
  tags: [timescaledb, debug]

- name: Check PostgreSQL extensions
  postgresql_query:
    db: postgres
    query: "SELECT name FROM pg_available_extensions WHERE name LIKE '%timescale%';"
  become_user: postgres
  register: available_extensions
  tags: [timescaledb, debug]

- name: Display available TimescaleDB extensions
  debug:
    var: available_extensions.query_result
  tags: [timescaledb, debug]

- name: Check if TimescaleDB extension is already enabled
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: "SELECT extname FROM pg_extension WHERE extname = 'timescaledb';"
  become_user: postgres
  register: timescaledb_enabled
  tags: [timescaledb, debug]

- name: Display TimescaleDB extension status
  debug:
    var: timescaledb_enabled.query_result
  tags: [timescaledb, debug]

- name: Enable TimescaleDB extension
  postgresql_ext:
    name: "timescaledb"
    db: "{{ postgresql_db_name }}"
    state: present
  become_user: postgres
  ignore_errors: yes
  register: timescaledb_result
  tags: [timescaledb, configure]

- name: Display TimescaleDB extension result
  debug:
    var: timescaledb_result
  tags: [timescaledb, debug]

- name: Check PostgreSQL logs for errors
  command: tail -n 20 /var/log/postgresql/postgresql-16-main.log
  become_user: postgres
  register: postgres_logs
  ignore_errors: yes
  tags: [timescaledb, debug]

- name: Display PostgreSQL logs
  debug:
    var: postgres_logs.stdout_lines
  tags: [timescaledb, debug]

- name: Check if weather_observations table exists
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: |
      SELECT EXISTS (
        SELECT FROM information_schema.tables 
        WHERE table_schema = 'public' 
        AND table_name = 'weather_observations'
      );
  become_user: postgres
  register: weather_table_exists
  tags: [timescaledb, configure]

- name: Display weather_observations table existence
  debug:
    var: weather_table_exists.query_result
  tags: [timescaledb, debug]

- name: Create TimescaleDB hypertables
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: |
      SELECT create_hypertable('weather_observations', 'time', if_not_exists => TRUE);
  become_user: postgres
  when: weather_table_exists.query_result[0].exists == true
  tags: [timescaledb, configure]

- name: Set data retention policy
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: |
      SELECT add_retention_policy('weather_observations', INTERVAL '1 year', if_not_exists => TRUE);
  become_user: postgres
  when: weather_table_exists.query_result[0].exists == true
  tags: [timescaledb, configure]

- name: Create TimescaleDB views
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: |
      CREATE OR REPLACE VIEW weather_summary AS
      SELECT
          wo.time,
          a.icao as icao_code,
          a.name as airport_name,
          a.city,
          a.state,
          a.country,
          wo.flight_category,
          wo.temperature_c,
          wo.dewpoint_c,
          wo.wind_dir_deg,
          wo.wind_speed_kts,
          wo.visibility_mi,
          wo.altimeter_hg,
          wo.ceiling_code,
          CASE
              WHEN wo.flight_category = 'VFR' THEN 1
              WHEN wo.flight_category = 'MVFR' THEN 2
              WHEN wo.flight_category = 'IFR' THEN 3
              WHEN wo.flight_category = 'LIFR' THEN 4
              ELSE 0
          END as flight_category_numeric
      FROM weather_observations wo
      JOIN airports a ON wo.airport_id = a.id
      ORDER BY wo.time DESC;
  become_user: postgres
  when: weather_table_exists.query_result[0].exists == true
  tags: [timescaledb, configure]
