---
# NTP Configuration

- name: Install NTP package
  apt:
    name: ntp
    state: present
  tags: [ntp]

- name: Configure NTP servers
  template:
    src: ntp.conf.j2
    dest: /etc/ntp.conf
    backup: yes
  notify: restart ntp
  tags: [ntp]

- name: Start and enable NTP service
  systemd:
    name: ntp
    state: started
    enabled: yes
  tags: [ntp]
