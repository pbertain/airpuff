---
# Fail2ban Configuration

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present
  tags: [fail2ban]

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban
  tags: [fail2ban]

- name: Start and enable fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: yes
  tags: [fail2ban]
