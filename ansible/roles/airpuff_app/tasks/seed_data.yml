---
# Initial Data Seeding

- name: Check if initial data already exists
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: "SELECT COUNT(*) FROM airports LIMIT 1;"
  become_user: postgres
  register: airports_count
  ignore_errors: yes
  tags: [app, data]

- name: Display airports count
  debug:
    var: airports_count.query_result
  tags: [app, data]

- name: Skip initial data seeding if data already exists
  meta: end_host
  when: airports_count.query_result is defined and airports_count.query_result[0].count > 0
  tags: [app, data]

- name: Create initial airports data
  postgresql_query:
    db: "{{ postgresql_db_name }}"
    query: |
      INSERT INTO airports (icao, name, city, state, country, latitude, longitude, elevation_ft, is_monitored) VALUES
      ('KORD', 'Chicago O''Hare International Airport', 'Chicago', 'IL', 'US', 41.9786, -87.9048, 672, FALSE),
      ('KLAX', 'Los Angeles International Airport', 'Los Angeles', 'CA', 'US', 33.9425, -118.4081, 125, FALSE),
      ('KJFK', 'John F. Kennedy International Airport', 'New York', 'NY', 'US', 40.6413, -73.7781, 13, FALSE),
      ('KDFW', 'Dallas/Fort Worth International Airport', 'Dallas', 'TX', 'US', 32.8968, -97.0380, 607, FALSE),
      ('KATL', 'Hartsfield-Jackson Atlanta International Airport', 'Atlanta', 'GA', 'US', 33.6407, -84.4277, 1026, FALSE),
      ('KSEA', 'Seattle-Tacoma International Airport', 'Seattle', 'WA', 'US', 47.4502, -122.3088, 433, FALSE),
      ('KDEN', 'Denver International Airport', 'Denver', 'CO', 'US', 39.8561, -104.6737, 5431, FALSE),
      ('KMIA', 'Miami International Airport', 'Miami', 'FL', 'US', 25.7959, -80.2870, 8, FALSE),
      ('KPHX', 'Phoenix Sky Harbor International Airport', 'Phoenix', 'AZ', 'US', 33.4342, -112.0116, 1135, FALSE),
      ('KLAS', 'Harry Reid International Airport', 'Las Vegas', 'NV', 'US', 36.0840, -115.1537, 2181, FALSE)
      ON CONFLICT (icao) DO NOTHING;
  become_user: postgres
  tags: [app, data]

- name: Display initial data seeding completion
  debug:
    msg: "Initial airports data seeded successfully"
  tags: [app, data]
