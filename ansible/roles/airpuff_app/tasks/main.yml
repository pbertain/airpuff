---
# AirPuff Application Deployment Role - Main Tasks

- name: Ensure application directory exists with proper permissions
  file:
    path: "{{ airpuff_app_home }}"
    state: directory
    owner: "{{ airpuff_app_user }}"
    group: "{{ airpuff_app_group }}"
    mode: '0755'
  become: yes
  tags: [app, git]

- name: Remove existing application code
  file:
    path: "{{ airpuff_app_home }}/backend"
    state: absent
  become: yes
  tags: [app, git]

- name: Remove any prior staging clone directory
  file:
    path: "/tmp/airpuff-{{ deployment_env }}-clone"
    state: absent
  become: yes
  tags: [app, git]

- name: Clone AirPuff repository to a staging directory
  git:
    repo: "{{ app_repo }}"
    dest: "/tmp/airpuff-{{ deployment_env }}-clone"
    version: "{{ app_branch }}"
    force: yes
  become: yes
  become_user: "{{ airpuff_app_user }}"
  tags: [app, git]

- name: Copy repository contents into application directory (preserves venv)
  command: cp -a . {{ airpuff_app_home }}/
  args:
    chdir: "/tmp/airpuff-{{ deployment_env }}-clone"
  become: yes
  become_user: "{{ airpuff_app_user }}"
  tags: [app, git]

- name: Remove staging clone directory
  file:
    path: "/tmp/airpuff-{{ deployment_env }}-clone"
    state: absent
  become: yes
  tags: [app, git]

- name: Install application dependencies
  pip:
    requirements: "{{ airpuff_app_home }}/backend/requirements.txt"
    virtualenv: "{{ virtualenv_path }}"
    virtualenv_command: "{{ virtualenv_path }}/bin/python -m pip"
    state: present
  become_user: "{{ airpuff_app_user }}"
  tags: [app, dependencies]

- name: Create application configuration
  include_tasks: config.yml
  tags: [app, config]

- name: Run database migrations
  include_tasks: migrations.yml
  tags: [app, database]

- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ airpuff_app_user }}"
    group: "{{ airpuff_app_group }}"
    mode: '0755'
  become: yes
  loop:
    - "{{ airpuff_app_logs }}"
    - "{{ airpuff_app_data }}"
    - "{{ airpuff_app_home }}/backend/logs"
    - "{{ airpuff_app_home }}/backend/static"
    - "{{ airpuff_app_home }}/backend/uploads"
  tags: [app, directories]

- name: Set up static files
  include_tasks: static.yml
  tags: [app, static]

- name: Handle RRD data
  include_tasks: rrd_data.yml
  tags: [app, rrd_data]
  when: rrd_data_enabled | default(false)

- name: Create systemd service files
  include_tasks: systemd.yml
  tags: [app, systemd]

- name: Start AirPuff application
  systemd:
    name: airpuff-{{ deployment_env }}-app
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [app, service]

