---
# Database Migrations

- name: Check if Alembic is already initialized
  stat:
    path: "{{ airpuff_app_home }}/backend/alembic"
  register: alembic_exists
  tags: [app, migrations]

- name: Initialize Alembic
  command: "{{ virtualenv_path }}/bin/alembic init alembic"
  args:
    chdir: "{{ airpuff_app_home }}/backend"
  become_user: "{{ airpuff_app_user }}"
  when: not alembic_exists.stat.exists
  tags: [app, migrations]

- name: Run database migrations
  command: "{{ virtualenv_path }}/bin/alembic upgrade head"
  args:
    chdir: "{{ airpuff_app_home }}/backend"
  become_user: "{{ airpuff_app_user }}"
  environment:
    DATABASE_URL: "postgresql://{{ postgresql_db_user }}:{{ postgresql_db_password }}@localhost:{{ airpuff_timescaledb_port }}/{{ postgresql_db_name }}"
  tags: [app, migrations]

- name: Verify database migrations reached head
  command: "{{ virtualenv_path }}/bin/alembic current"
  args:
    chdir: "{{ airpuff_app_home }}/backend"
  become_user: "{{ airpuff_app_user }}"
  environment:
    DATABASE_URL: "postgresql://{{ postgresql_db_user }}:{{ postgresql_db_password }}@localhost:{{ airpuff_timescaledb_port }}/{{ postgresql_db_name }}"
  register: alembic_current
  changed_when: false
  tags: [app, migrations]

- name: Assert database migrations are current
  assert:
    that:
      - "'002' in alembic_current.stdout"
    fail_msg: "Alembic did not reach head revision after deploy."
  tags: [app, migrations]

- name: Create initial data
  include_tasks: seed_data.yml
  tags: [app, data]
