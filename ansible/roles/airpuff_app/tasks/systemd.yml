---
# SystemD Service Setup

- name: Create AirPuff web service
  template:
    src: airpuff-web.service.j2
    dest: /etc/systemd/system/airpuff-web.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd
  tags: [app, systemd]

- name: Create AirPuff fetcher service
  template:
    src: airpuff-fetcher.service.j2
    dest: /etc/systemd/system/airpuff-fetcher.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd
  tags: [app, systemd]

- name: Create AirPuff fetcher timer
  template:
    src: airpuff-fetcher.timer.j2
    dest: /etc/systemd/system/airpuff-fetcher.timer
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd
  tags: [app, systemd]

- name: Remove legacy AirPuff systemd units
  file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop:
    - airpuff-app.service
    - "airpuff-{{ deployment_env }}-app.service"
    - airpuff-weather.service
    - airpuff-weather.timer
    - airpuff-imessage.service
    - airpuff-imessage.timer
  notify: reload systemd
  tags: [app, systemd]

- name: Enable and start fetcher timer
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop:
    - airpuff-fetcher.timer
  tags: [app, systemd]
